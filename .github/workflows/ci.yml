name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kozou
          POSTGRES_DB: kozou
          # Trust auth so the test URL needs no password: Electron safeStorage
          # is unavailable on headless Linux (no keyring), and the app
          # deliberately refuses to store passwords without it. The
          # password/encryption *logic* is unit-tested with a fake encryptor;
          # the real safeStorage integration path runs in the macos-e2e job.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kozou"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      KOZOU_TEST_DATABASE_URL: postgresql://kozou@127.0.0.1:5432/kozou
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Load contract fixture
        run: psql "$KOZOU_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f fixtures/contract.sql
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm test:contract
      - run: pnpm build
      - run: pnpm check:treeshake
      - run: pnpm check:egress
      - name: E2E (xvfb)
        run: xvfb-run -a pnpm test:e2e

  # Exercises the REAL safeStorage path (macOS Keychain): the profile URL
  # carries a password (the trust-auth server accepts any), so the e2e run
  # covers encrypt -> store -> decrypt -> rejoin -> worker end to end —
  # coverage the Linux job cannot provide.
  macos-e2e:
    runs-on: macos-latest
    env:
      KOZOU_TEST_DATABASE_URL: postgresql://kozou:trialpass@127.0.0.1:5432/kozou
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Start PostgreSQL 16 (trust auth)
        run: |
          brew install postgresql@16
          PGBIN="$(brew --prefix postgresql@16)/bin"
          "$PGBIN/initdb" --username=kozou --auth=trust "$RUNNER_TEMP/pgdata"
          "$PGBIN/pg_ctl" -D "$RUNNER_TEMP/pgdata" -l "$RUNNER_TEMP/pg.log" start
          "$PGBIN/createdb" --username=kozou kozou
          "$PGBIN/psql" "$KOZOU_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f fixtures/contract.sql
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:e2e
